specVersion: 1.3.0
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: CityWeapons
    network: base
    source:
      address: "0x6b3cDe1DdACDFB5dC060f10A94Ea52b237E5131F"
      abi: CityWeapons
      startBlock: 43495244
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/city-weapons.ts
      entities:
        - Player
        - WeaponDefinition
        - WeaponInstance
      abis:
        - name: CityWeapons
          file: ./abis/CityWeapons.json
      eventHandlers:
        - event: WeaponDefinitionSet(indexed uint256,string,uint8,uint8,uint256,bool)
          handler: handleWeaponDefinitionSet
        - event: WeaponMinted(indexed uint256,indexed address,indexed uint256,bytes32,bytes32)
          handler: handleWeaponMinted
        - event: WeaponMetadataRevisionSet(indexed uint256,uint256)
          handler: handleWeaponMetadataRevisionSet
        - event: WeaponUpgradeLevelSet(indexed uint256,uint256)
          handler: handleWeaponUpgradeLevelSet
        - event: WeaponDurabilitySet(indexed uint256,uint256)
          handler: handleWeaponDurabilitySet

  - kind: ethereum
    name: CityCrafting
    network: base
    source:
      address: "0x5cC5e3a0455b83620759D2eD6712A5aFc45F9eCF"
      abi: CityCrafting
      startBlock: 43495244
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/city-crafting.ts
      entities:
        - RecipeDefinition
        - CraftEvent
      abis:
        - name: CityCrafting
          file: ./abis/CityCrafting.json
      eventHandlers:
        - event: RecipeSet(indexed uint256,uint8,uint256,uint256,bool)
          handler: handleRecipeSet
        - event: Crafted(indexed address,indexed uint256,uint8,uint256,uint256)
          handler: handleCrafted
        - event: WeaponCrafted(indexed address,indexed uint256,indexed uint256,uint256,uint256)
          handler: handleWeaponCrafted

  - kind: ethereum
    name: CityRegistry
    network: base
    source:
      address: "0x5d3269813Fea0C0F487A21cBf9992b95008558BF"
      abi: CityRegistry
      startBlock: 43495244
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/city-registry.ts
      entities:
        - Player
        - Plot
      abis:
        - name: CityRegistry
          file: ./abis/CityRegistry.json
      eventHandlers:
        - event: CityKeyTokenSet(indexed address,indexed uint256)
          handler: handleCityKeyTokenSet
        - event: FactionChosen(indexed address,indexed uint8)
          handler: handleFactionChosen
        - event: PersonalPlotReserved(indexed address,indexed uint256,indexed uint8,uint8)
          handler: handlePersonalPlotReserved
        - event: CommunityPlotReserved(indexed uint256,indexed uint8)
          handler: handleCommunityPlotReserved