}

type Plot @entity(immutable: false) {
  id: ID!
  plotId: BigInt!
  owner: Player
  plotType: String!
  faction: String!
  status: String!
  width: BigInt!
  height: BigInt!
  createdAt: BigInt!
  exists: Boolean!
}

type WeaponDefinition @entity(immutable: false) {
  id: ID!
  weaponDefinitionId: BigInt!
  name: String!
  classId: Int!
  damageTypeId: Int!
  techTier: BigInt!

  requiredLevel: BigInt!
  requiredTechTier: BigInt!
