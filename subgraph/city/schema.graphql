type Player @entity(immutable: false) {
  id: ID!
  cityKeyTokenId: BigInt
  faction: String
  personalPlotCount: Int!
  craftedWeapons: [WeaponInstance!]! @derivedFrom(field: "owner")
}

type Plot @entity(immutable: false) {
  id: ID!
  plotId: BigInt!
  owner: Player
  plotType: String!
  faction: String!
  createdAt: BigInt!
  exists: Boolean!
}

type WeaponDefinition @entity(immutable: false) {
  id: ID!
  weaponDefinitionId: BigInt!
  name: String!
  classId: Int!
  damageTypeId: Int!
  techTier: BigInt!
  enabled: Boolean!
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
}

type WeaponInstance @entity(immutable: false) {
  id: ID!
  tokenId: BigInt!
  owner: Player!
  weaponDefinition: WeaponDefinition!
  metadataRevision: BigInt!
  upgradeLevel: BigInt!
  durability: BigInt!
  craftSeed: Bytes!
  provenanceHash: Bytes!
  txHash: Bytes!
  blockNumber: BigInt!
}

type RecipeDefinition @entity(immutable: false) {
  id: ID!
  recipeId: BigInt!
  outputKind: Int!
  outputId: BigInt!
  outputAmount: BigInt!
  enabled: Boolean!
  updatedAtBlock: BigInt!
  updatedAtTimestamp: BigInt!
}

type CraftEvent @entity(immutable: true) {
  id: ID!
  user: Bytes!
  recipeId: BigInt!
  outputKind: Int!
  outputId: BigInt!
  outputAmount: BigInt!
  tokenId: BigInt
  weaponDefinitionId: BigInt
  craftNonce: BigInt
  txHash: Bytes!
  blockNumber: BigInt!
  timestamp: BigInt!
}