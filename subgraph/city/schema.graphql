type Player @entity {
  id: ID!
  cityKeyTokenId: BigInt
  faction: String
  personalPlotCount: Int!
  createdPlots: [Plot!]! @derivedFrom(field: "owner")
}

type Plot @entity {
  id: ID!
  plotId: BigInt!
  owner: Player
  plotType: String!
  faction: String!
  status: String!
  width: Int!
  height: Int!
  createdAt: BigInt!
  exists: Boolean!

  districtKind: String
  districtBonusBps: Int

  completionBps: Int
  completedQubiqCount: Int
  aetherUses: Int

  firstBuilder: Bytes
  genesisEra: Boolean
  layerCount: Int
  ownershipTransfers: Int
  historicScore: Int

  qubiqs: [Qubiq!]! @derivedFrom(field: "plot")
  contributions: [Contribution!]! @derivedFrom(field: "plot")
}

type Qubiq @entity {
  id: ID!
  plot: Plot!
  x: Int!
  y: Int!
  completed: Boolean!
  usedAether: Boolean!
  completedAt: BigInt
  lastContributor: Bytes
}

type Contribution @entity {
  id: ID!
  plot: Plot!
  contributor: Bytes!
  x: Int!
  y: Int!
  oil: BigInt!
  lemons: BigInt!
  iron: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type PlotHistoryEvent @entity {
  id: ID!
  plot: Plot!
  eventType: String!
  value: BigInt
  timestamp: BigInt!
  txHash: Bytes!
}

type DistrictAssignment @entity {
  id: ID!
  plot: Plot!
  districtKind: String!
  faction: String!
  bonusBps: Int!
  timestamp: BigInt!
  txHash: Bytes!
}

type StatusEvent @entity {
  id: ID!
  plot: Plot!
  oldStatus: String
  newStatus: String!
  timestamp: BigInt!
  txHash: Bytes!
}